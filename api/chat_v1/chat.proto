syntax = "proto3";

package chat_v1;

option go_package = "github.com/Coldwws/chat_practice/pkg/chat_v1;chat_v1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "validate/validate.proto";
import "google/api/annotations.proto";

service ChatV1 {
  rpc Create(CreateRequest)returns(CreateResponse){
    option(google.api.http)={
      post: "/chat/v1/create"
      body: "*"
    };
  };
  rpc Delete(DeleteRequest)returns(google.protobuf.Empty){
    option(google.api.http)={
      post: "/chat/v1/delete/{id}"
    };
  };
  rpc SendMessage(SendMessageRequest)returns(google.protobuf.Empty){
    option(google.api.http)={
      post: "/chat/v1/send_message"
      body: "*"
    };
  };
}

message CreateRequest{
  repeated string usernames = 1 [(validate.rules).repeated = {min_items: 1, max_items: 10, items: {string: {min_len: 1}}}]; 
}

message CreateResponse{
  int64 id = 1;
}

message DeleteRequest{
  int64 id = 1;
}

message SendMessageRequest{
  string from = 1;
  string text = 2;
  google.protobuf.Timestamp timestamp = 3;
  int64 chat_id = 4;
}